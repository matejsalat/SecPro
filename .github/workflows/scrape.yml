name: Scrape & Ingest

# Runs every 2 hours (12√ó daily). Free tier on GitHub Actions:
#   - 2000 min/month for free repos
#   - This workflow: ~5-8 min per run √ó 12 runs/day √ó 30 days ‚Čą 2160 min
#     (just over budget ‚ÄĒ we'll tune cadence if it gets close)
#
# To enable: in repo Settings ‚Üí Secrets and variables ‚Üí Actions, add:
#   SUPABASE_URL                = https://zhvptfstdrxtscdmohbs.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY   = <service_role key from Supabase>
#   GEMINI_API_KEY              = <Google AI Studio key>

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run scrapers
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
        run: node workers/backfill.js
        continue-on-error: true

  extract:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run AI extraction (capped)
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
        # Cap at 100 listings per run to stay within Gemini free tier daily quota
        run: node workers/extract-pending.js --limit 100 --delay 1000
        continue-on-error: true
