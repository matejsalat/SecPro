name: Scrape & Ingest

# Matrix strategy: 8 cities run IN PARALLEL ‚Üí each city finishes in ~5 min instead of 30 min serial.
# Free tier GH Actions allows 20 concurrent jobs ‚Üí 8 cities + 1 extract = safe.
#
# Cron: every 2h (12√ó daily). Each run cost: ~50 min total CPU minutes (matrix sums across cities).

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false   # one city failing should not abort the others
      matrix:
        city:
          - Bratislava
          - KoŇ°ice
          - Trenńć√≠n
          - ŇĹilina
          - Nitra
          - Trnava
          - Bansk√° Bystrica
          - PreŇ°ov
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Scrape ${{ matrix.city }}
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
        run: node workers/backfill.js --city "${{ matrix.city }}"

  extract:
    needs: scrape
    if: always()   # run extraction even if some scrape jobs failed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: AI extraction (cap 200/run)
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
        run: node workers/extract-pending.js --limit 200 --delay 1000
        continue-on-error: true

  dedup:
    needs: extract
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Cross-portal dedup (cap 500/run)
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Dedup script created by background agent, see backend/workers/dedup-pending.js
        run: |
          if [ -f workers/dedup-pending.js ]; then
            node workers/dedup-pending.js --limit 500 --hours 6
          else
            echo "dedup-pending.js not yet implemented, skipping"
          fi
        continue-on-error: true
